name: CI — Unit Tests

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
#   • Every pull request targeting main or develop
#   • Every direct push to main or develop
# ─────────────────────────────────────────────────────────────────────────────
on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

# Cancel any in-progress run for the same PR/branch so we never queue up stale jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests (JVM + Robolectric)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # ── 3. Gradle wrapper permission (Linux only) ─────────────────────────────
      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      # ── 4. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 5. Run unit tests ─────────────────────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      # ── 6. Upload test report (always, even on failure) ───────────────────────
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 14

      # ── 7. Upload test results XML (used by GitHub PR checks) ─────────────────
      - name: Upload test results XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-xml
          path: app/build/test-results/testDebugUnitTest/
          retention-days: 14

      # ── 8. Publish test results as PR check annotation ────────────────────────
      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: app/build/test-results/testDebugUnitTest/TEST-*.xml
          check_name: Unit Test Results
          fail_on_failure: true
          require_tests: true

